name: CI Workflow

on:
  push:
    branches:
      - lab2
  pull_request:
    branches:
      - lab2

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          mkdir -p artifacts
          python -m pytest tests/ | tee artifacts/test_report.txt

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_result
          path: artifacts/test_report.txt
