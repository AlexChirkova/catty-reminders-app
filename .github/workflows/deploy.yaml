name: CD Workflow

on:
  release:
    [cite_start]types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to VM
        [cite_start]uses: appleboy/ssh-action@v1 [cite: 122]
        with:
          [cite_start]host: course.prafdin.ru [cite: 63]
          [cite_start]username: kali [cite: 127]
          [cite_start]port: 3162
          [cite_start]key: ${{ secrets.SSH_PRIVATE_KEY }} [cite: 119]
          script: |
            IMAGE="ghcr.io/alexchirkova/catty-reminders-app"
            TAG="latest"
            CONTAINER_NAME="catty-app"
            
            echo "1. Авторизация в GHCR на удаленном сервере..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "2. Скачивание актуального Docker-образа..."
            docker pull $IMAGE:$TAG
            
            echo "3. Остановка старой службы systemctl..."
            sudo systemctl stop catty-app 2>/dev/null || true
            sudo systemctl disable catty-app 2>/dev/null || true
            
            echo "4. Удаление старого контейнера..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true
            
            echo "5. Запуск приложения в Docker-контейнере..."
            docker run -d \
              --name $CONTAINER_NAME \
              -p 8181:8181 \
              --restart always \
              -e DEPLOY_REF="${{ github.sha }}" \
              $IMAGE:$TAG
              
            echo "Деплой успешно завершен!"
