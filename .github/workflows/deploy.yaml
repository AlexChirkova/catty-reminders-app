name: CD Workflow

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to VM
        uses: appleboy/ssh-action@v1
        with:
          host: course.prafdin.ru
          username: kali
          port: 3162
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash -c '
              set -e
              cd /home/kali/catty-reminders-app
              OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
              
              export DEPLOY_REF=${{ github.sha }}
              export IMAGE=ghcr.io/$OWNER/catty-reminders-app:${{ github.sha }}
              
              export DB_CONTAINER_NAME=catty-db
              export APP_CONTAINER_NAME=catty-app
              export MARIADB_ROOT_PASSWORD=mypass
              export MARIADB_USER=kali
              export MARIADB_PASSWORD=mypass
              export MARIADB_DATABASE=catty_reminders
              export HOST_DB_PORT=3306
              export CONTEINER_DB_PORT=3306
              export HOST_APP_PORT=8181
              export CONTEINER_APP_PORT=8181

              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              docker compose up -d --pull always --remove-orphans --force-recreate 
            '

